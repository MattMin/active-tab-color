<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="6" y1="4" x2="34" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2530"/>
      <stop offset="1" stop-color="#090B10"/>
    </linearGradient>

    <linearGradient id="activeTab" x1="14" y1="8" x2="26" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2EA7FF"/>
      <stop offset="1" stop-color="#0969FF"/>
    </linearGradient>

    <linearGradient id="accentBar" x1="8" y1="31" x2="32" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3D7F"/>
      <stop offset="0.2" stop-color="#FF9F1C"/>
      <stop offset="0.4" stop-color="#FFE033"/>
      <stop offset="0.6" stop-color="#44D860"/>
      <stop offset="0.8" stop-color="#2EA7FF"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>

    <linearGradient id="dropperBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56B8FF"/>
      <stop offset="1" stop-color="#1E6FFF"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#E8EEF8" stop-opacity="0.98"/>
    </linearGradient>

    <linearGradient id="metalTip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D8E0EC"/>
      <stop offset="1" stop-color="#A6B2C5"/>
    </linearGradient>

    <filter id="blueGlow" x="9" y="4" width="22" height="20" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
                     values="0 0 0 0 0.05
                0 0 0 0 0.45
                0 0 0 0 1
                0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="3" y="4" width="34" height="32" rx="7" fill="url(#bg)"/>

  <!-- Top divider -->
  <rect x="3" y="14" width="34" height="2" fill="#232833" opacity="0.92"/>

  <!-- Left inactive tab -->
  <path d="M6 10.5C6 9.1 7.1 8 8.5 8H13.2C14.3 8 15.3 8.7 15.7 9.7L16.5 14H6V10.5Z"
        fill="#343A47" opacity="0.9"/>

  <!-- Right inactive tab -->
  <path d="M23.5 14L24.3 9.7C24.7 8.7 25.7 8 26.8 8H31.5C32.9 8 34 9.1 34 10.5V14H23.5Z"
        fill="#343A47" opacity="0.9"/>

  <!-- Active tab glow -->
  <path d="M13 14L14.3 9.1C14.6 7.9 15.7 7 17 7H23C24.3 7 25.4 7.9 25.7 9.1L27 14H13Z"
        fill="#1677FF" opacity="0.45" filter="url(#blueGlow)"/>

  <!-- Active tab -->
  <path d="M13 14L14.3 9.1C14.6 7.9 15.7 7 17 7H23C24.3 7 25.4 7.9 25.7 9.1L27 14H13Z"
        fill="url(#activeTab)"/>

  <!-- Tiny active indicator -->
  <circle cx="17" cy="10.2" r="1.1" fill="white" opacity="0.92"/>

  <!-- Smaller refined eyedropper -->
  <g transform="translate(-4 0)rotate(45 24 24)">
    <!-- blue bulb / handle -->
    <rect x="22.2" y="15.6" width="3.6" height="5.8" rx="1.8" fill="url(#dropperBlue)"/>
    <path d="M22.8 16.2C23.1 15.9 23.5 15.7 23.9 15.7H24.5C23.9 15.7 23.4 16.2 23.4 16.8V19.9C23.4 20.4 23.6 20.8 23.9 21.1C23.1 20.7 22.6 19.9 22.6 19V16.6C22.6 16.5 22.7 16.3 22.8 16.2Z"
          fill="white" fill-opacity="0.16"/>

    <!-- collar -->
    <rect x="21.6" y="20.9" width="4.8" height="1.45" rx="0.72" fill="#F7FAFF"/>
    <rect x="21.85" y="21.15" width="4.3" height="0.95" rx="0.47" fill="#E7EEF8"/>

    <!-- glass tube outer -->
    <path d="M22.35 22.15H25.65V28.15C25.65 28.9 25.3 29.58 24.72 30L24.35 30.28C24.14 30.44 23.86 30.44 23.65 30.28L23.28 30C22.7 29.58 22.35 28.9 22.35 28.15V22.15Z"
          fill="url(#glass)"/>

    <!-- glass highlight -->
    <path d="M22.7 22.45H23.25V28.1C23.25 28.52 23.42 28.9 23.7 29.16C23.02 28.92 22.55 28.28 22.55 27.55V22.6C22.55 22.52 22.62 22.45 22.7 22.45Z"
          fill="white" fill-opacity="0.42"/>

    <!-- inner blue liquid -->
    <path d="M23.45 23.05H24.55C24.83 23.05 25.05 23.27 25.05 23.55V27.75C25.05 28.13 24.87 28.49 24.57 28.71L24.28 28.93C24.11 29.06 23.89 29.06 23.72 28.93L23.43 28.71C23.13 28.49 22.95 28.13 22.95 27.75V23.55C22.95 23.27 23.17 23.05 23.45 23.05Z"
          fill="url(#dropperBlue)"/>

    <!-- connector -->
    <path d="M22.75 29.55C23 29.78 23.27 29.99 23.56 30.16C23.83 30.32 24.17 30.32 24.44 30.16C24.73 29.99 25 29.78 25.25 29.55V29.95C25.25 30.3 25.09 30.62 24.81 30.83L24.41 31.13C24.16 31.32 23.84 31.32 23.59 31.13L23.19 30.83C22.91 30.62 22.75 30.3 22.75 29.95V29.55Z"
          fill="#F2F6FC"/>

    <!-- blunt metal tip -->
    <path d="M23.55 31.2C23.67 31.08 23.83 31 24 31C24.17 31 24.33 31.08 24.45 31.2L24.78 31.53C25 31.75 25 32.11 24.78 32.33L24.38 32.73C24.28 32.83 24.14 32.9 24 32.9C23.86 32.9 23.72 32.83 23.62 32.73L23.22 32.33C23 32.11 23 31.75 23.22 31.53L23.55 31.2Z"
          fill="url(#metalTip)"/>

    <!-- subtle outline -->
    <path d="M22.35 22.15H25.65V28.15C25.65 28.9 25.3 29.58 24.72 30L24.35 30.28C24.14 30.44 23.86 30.44 23.65 30.28L23.28 30C22.7 29.58 22.35 28.9 22.35 28.15V22.15Z"
          stroke="#DCE6F4" stroke-width="0.22" opacity="0.55"/>
  </g>

  <!-- Color accent bar -->
  <rect x="8" y="31" width="24" height="3" rx="1.5" fill="url(#accentBar)"/>

  <!-- Border -->
  <rect x="3.5" y="4.5" width="33" height="31" rx="6.5"
        stroke="white" stroke-opacity="0.06"/>
</svg>