<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="activeTab" x1="14" y1="8" x2="26" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F80FF"/>
      <stop offset="1" stop-color="#1AA3FF"/>
    </linearGradient>

    <linearGradient id="inactiveTab" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF2F8"/>
      <stop offset="1" stop-color="#DCE4F0"/>
    </linearGradient>

    <linearGradient id="panelBg" x1="4" y1="14" x2="34" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F9FBFF"/>
      <stop offset="1" stop-color="#EEF3FA"/>
    </linearGradient>

    <linearGradient id="dropperBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4DB6FF"/>
