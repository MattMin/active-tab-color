      <feGaussianBlur stdDeviation="1.2"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.15 0 0 0 0 0.22 0 0 0 0 0.34 0 0 0 0.16 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- transparent background by default -->

