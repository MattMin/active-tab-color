      <stop offset="1" stop-color="#EAF1FA"/>
    </linearGradient>

    <linearGradient id="rubber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A6578"/>
      <stop offset="1" stop-color="#2E3748"/>
    </linearGradient>

    <filter id="softShadow" x="1" y="4" width="38" height="33" filterUnits="userSpaceOnUse">
